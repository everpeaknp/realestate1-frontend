name: Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy stack on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            cd /opt/stacks/realestate1/frontend
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            git clean -fd

            cd /opt/stacks/realestate1/backend
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            git clean -fd

            cd /opt/stacks/realestate1
            docker compose up -d --build realestate1-frontend realestate1-backend

            docker compose ps
            curl -fsS http://127.0.0.1:8000/api/blog/posts/ >/dev/null
            curl -fsS http://127.0.0.1:3000/ >/dev/null
